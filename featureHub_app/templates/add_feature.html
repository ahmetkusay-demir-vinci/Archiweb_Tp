{% extends 'base.html' %}

{% block title %}Ajouter une demande — FeatureHub{% endblock %}

{% block content %}
    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary mb-3">← Retour</a>
    <h2>Nouvelle demande</h2>

    <form method="POST" class="mt-3" style="max-width: 600px;">
        <!-- Titre -->
        <div class="mb-3">
            <label for="title" class="form-label">Titre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="title" name="title" maxlength="100" required>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="4"></textarea>
        </div>

        <!-- Nature -->
        <div class="mb-3">
            <label for="nature" class="form-label">Nature</label>
            <select class="form-select" id="nature" name="nature">
                <option value="Feature">Feature</option>
                <option value="Bug">Bug</option>
                <option value="Amélioration">Amélioration</option>
            </select>
        </div>

        <!-- Priorité -->
        <div class="mb-3">
            <label for="priority" class="form-label">Priorité</label>
            <select class="form-select" id="priority" name="priority">
                <option value="Haute">Haute</option>
                <option value="Moyenne" selected>Moyenne</option>
                <option value="Basse">Basse</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Soumettre</button>
    </form>
{% endblock %}
