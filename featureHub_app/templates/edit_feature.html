{% extends 'base.html' %}

{% block title %}Modifier — {{ feature.title }} — FeatureHub{% endblock %}

{% block content %}
    <a href="{{ url_for('view_feature', feature_id=feature.id) }}" class="btn btn-outline-secondary mb-3">← Retour</a>
    <h2>Modifier la demande</h2>

    <form method="POST" class="mt-3" style="max-width: 600px;">
        <!-- Titre -->
        <div class="mb-3">
            <label for="title" class="form-label">Titre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="title" name="title"
                   value="{{ feature.title }}" maxlength="100" required>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="4">{{ feature.description or '' }}</textarea>
        </div>

        <!-- Nature -->
        <div class="mb-3">
            <label for="nature" class="form-label">Nature</label>
            <select class="form-select" id="nature" name="nature">
                <option value="Feature"      {% if feature.nature == 'Feature' %}selected{% endif %}>Feature</option>
                <option value="Bug"          {% if feature.nature == 'Bug' %}selected{% endif %}>Bug</option>
                <option value="Amélioration" {% if feature.nature == 'Amélioration' %}selected{% endif %}>Amélioration</option>
            </select>
        </div>

        <!-- Priorité -->
        <div class="mb-3">
            <label for="priority" class="form-label">Priorité</label>
            <select class="form-select" id="priority" name="priority">
                <option value="Haute"   {% if feature.priority == 'Haute' %}selected{% endif %}>Haute</option>
                <option value="Moyenne" {% if feature.priority == 'Moyenne' %}selected{% endif %}>Moyenne</option>
                <option value="Basse"   {% if feature.priority == 'Basse' %}selected{% endif %}>Basse</option>
            </select>
        </div>

        <!-- Statut -->
        <div class="mb-3">
            <label for="status" class="form-label">Statut</label>
            <select class="form-select" id="status" name="status">
                <option value="En attente" {% if feature.status == 'En attente' %}selected{% endif %}>En attente</option>
                <option value="Validé"     {% if feature.status == 'Validé' %}selected{% endif %}>Validé</option>
                <option value="Rejeté"     {% if feature.status == 'Rejeté' %}selected{% endif %}>Rejeté</option>
            </select>
        </div>

        <button type="submit" class="btn btn-warning">Enregistrer les modifications</button>
    </form>
{% endblock %}
