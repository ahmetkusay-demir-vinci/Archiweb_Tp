<!DOCTYPE html>
<html>
<head>
    <title>Validation Complexe</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        form { background: #f9f9f9; padding: 20px; border-radius: 8px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, textarea, select { display: block; padding: 8px; width: 100%; margin-top: 5px; box-sizing: border-box; }
        button { margin-top: 15px; padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .alert { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Exemple 4 : Validation Côté Serveur</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/article">
            <label for="titre">Titre (min 3 caractères) :</label>
                <input type="text" id="titre" name="titre" placeholder="Entrez un titre" required>
                
            <label for="description">Description (min 10 caractères) :</label>
                <textarea id="description" name="description" rows="5" placeholder="Entrez une description" required></textarea>
            
            <label for="categorie">Catégorie :</label>
                <select id="categorie" name="categorie" required>
                    <option value="">-- Sélectionnez --</option>
                    <option value="Tech">Tech</option>
                    <option value="Lifestyle">Lifestyle</option>
                    <option value="Autre">Autre</option>
                </select>

            <button type="submit">Publier Article</button>
        </form>
        <hr>
        <p><a href="/">Retour</a></p>
    </div>
</body>
</html>
